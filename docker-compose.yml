services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - path: .env
        required: false
    environment:
      SENTINEL_DECISION_LOG: /app/data/decision_log.jsonl
      SENTINEL_STATE_PATH: /app/data/sentinel_state.json
      SENTINEL_ALERT_AUDIO_DIR: /app/data/alerts
    volumes:
      - mythos-data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_USE_MOCKS: "false"
        VITE_API_BASE_URL: ""
        VITE_BACKGROUND_IMAGE: "/backgrounds/cluster-bg.jpg"
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mythos-data:
