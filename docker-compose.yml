services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      GRADIUM_API_KEY: ${GRADIUM_API_KEY:-}
      GRADIUM_VOICE_ID: ${GRADIUM_VOICE_ID:-LFZvm12tW_z0xfGo}
      GRADIUM_TTS_SPEED: ${GRADIUM_TTS_SPEED:-1.8}
      CRUSOE_BASE_URL: ${CRUSOE_BASE_URL:-https://api.inference.crusoecloud.com/v1/}
      CRUSOE_API_KEY: ${CRUSOE_API_KEY:-}
      CRUSOE_MODEL: ${CRUSOE_MODEL:-nvidia/NVIDIA-Nemotron-3-Ultra-550B}
      CRUSOE_TIMEOUT_SECONDS: ${CRUSOE_TIMEOUT_SECONDS:-5}
      SENTINEL_TTS_ENABLED: ${SENTINEL_TTS_ENABLED:-true}
      SENTINEL_TTS_OPERATOR_ACTIONS: ${SENTINEL_TTS_OPERATOR_ACTIONS:-true}
      SENTINEL_DECISION_LOG: /app/data/decision_log.jsonl
      SENTINEL_STATE_PATH: /app/data/sentinel_state.json
      SENTINEL_ALERT_AUDIO_DIR: /app/data/alerts
    volumes:
      - mythos-data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_USE_MOCKS: "false"
        VITE_API_BASE_URL: ""
        VITE_BACKGROUND_IMAGE: "/backgrounds/cluster-bg.jpg"
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mythos-data:
